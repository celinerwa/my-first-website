<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


    <style>
      .left{
        background-color: green;
        color: white;
        margin: 10px;
        border-radius: 10px;
        padding: 9px;
      }
      .right{
        background-color: cyan;
        color: white;
        margin: 10px;
        border-radius: 10px;
        padding: 9px;
      
      }
      .add{
        background-color: pink;
        padding: 10px;
        width: 390px;
        border-radius: 10px;
      }
      .sms{
        background-color: lightblue;
        padding: 10px;
        width: 390px;
        border-radius: 10px;
      }
      .btn{
        background-color: chocolate;
        border-radius: 20px;
        padding: 10px;
      }
      form{
        border: solid 20px lightblue;
        padding: 20px;
        width: 450px;
        margin: 23px;
        
      }
      .psms{
        color: rgb(34, 35, 36);
        margin: 1px;
        text-align: left;
        
      }
      input[type=number]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
      }
    </style>
  </head>
  <body>
 <form action="https://formspree.io/f/xpqjgzgd" method="POST">
  <h3>Get in touch</h3>
  <input class="left" type="text" placeholder="Frist Name" required>
  <input class="right" type="text" placeholder="Last Name" required>
  <br>
  <input class="left" type="email" placeholder="Email" required>
  <input class="right" type="number" placeholder="Phone" required>
  <br>
  <input class="add" type="address" placeholder="address" required>
  <br><br>
  <textarea class="sms" name="message" placeholder="your message" required></textarea>
  <br><br>
  <button class="btn" type="submit" style="margin-left: 170px;">submit</button>
  <p class="psms">Thanks submiting</p>
</form>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var form = document.getElementById('contact-form');
    if (!form) return;

    form.addEventListener('submit', function(event) {
        event.preventDefault();

        var formData = new FormData(form);
        var submitButton = form.querySelector('button[type="submit"]');
        var originalText = submitButton.innerHTML;

        // Show loading state
        submitButton.disabled = true;
        submitButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

        // Send to Formspree using fetch
        fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
                'Accept': 'application/json'
            }
        })
        .then(function(response) {
            if (response.ok) {
                alert('SUCCESS! Your message has been sent. We will get back to you soon!');
                form.reset();
            } else {
                return response.json().then(function(data) {
                    throw new Error(data.errors ? data.errors.map(e => e.message).join(', ') : 'Form submission failed');
                });
            }
        })
        .catch(function(error) {
            console.error('Error:', error);
            alert('FAILED... ' + error.message);
        })
        .finally(function() {
            // Reset button state
            submitButton.disabled = false;
            submitButton.innerHTML = originalText;
        });
    });

    console.log('Contact form connected to Formspree');
});
</script>


</body>
</html>
